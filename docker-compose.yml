services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: provenuance
      POSTGRES_USER: provenuance
      POSTGRES_PASSWORD: provenuance
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed_ontology.sql:/docker-entrypoint-initdb.d/02_seed_ontology.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provenuance -d provenuance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
